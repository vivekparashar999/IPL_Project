<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IPL Live Predictor</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏏</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080a;--card:#0f1117;--card2:#161b22;--border:#21262d;--border2:#30363d;
  --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --accent:#7c3aed;--accent2:#a855f7;--green:#238636;--green2:#3fb950;
  --red:#da3633;--red2:#f85149;--yellow:#d29922;--yellow2:#e3b341;
  --blue:#1f6feb;--blue2:#58a6ff;--orange:#bd561d;--orange2:#f0883e;
  --radius:12px;
}
html{font-size:15px}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}

/* ── Layout ── */
.page{max-width:1200px;margin:0 auto;padding:20px 16px 60px}

/* ── Top Bar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.logo{display:flex;align-items:center;gap:10px}
.logo h1{font-size:22px;font-weight:900;letter-spacing:-0.5px}
.logo h1 span{color:var(--accent2)}
.live-badge{display:flex;align-items:center;gap:6px;background:#1a0a0a;border:1px solid var(--red);color:var(--red2);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:1px;text-transform:uppercase}
.live-badge .dot{width:7px;height:7px;background:var(--red2);border-radius:50%;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.refresh-info{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:6px}
#countdown{font-weight:700;color:var(--text2)}

/* ── Match Selector ── */
.match-selector-wrap{margin-bottom:20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.match-selector-wrap label{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
select{background:var(--card);color:var(--text);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;flex:1;min-width:200px;cursor:pointer;outline:none}
select:focus{border-color:var(--accent2)}

/* ── Match Header Card ── */
.match-header{background:linear-gradient(135deg,#0d0a1a 0%,#0f1117 50%,#0a0d16 100%);border:1px solid var(--border2);border-radius:var(--radius);padding:20px 24px;margin-bottom:16px;position:relative;overflow:hidden}
.match-header::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(124,58,237,.15) 0%,transparent 70%);pointer-events:none}
.match-name{font-size:13px;color:var(--text2);margin-bottom:12px}
.scoreline{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.team-score{flex:1;min-width:140px}
.team-score .tname{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:4px}
.team-score .tscore{font-size:36px;font-weight:900;letter-spacing:-1px;line-height:1}
.team-score .tscore small{font-size:16px;font-weight:500;color:var(--text2);margin-left:2px}
.team-score .tovers{font-size:12px;color:var(--text3);margin-top:2px}
.vs-divider{font-size:18px;font-weight:800;color:var(--text3);padding:0 8px}
.match-status{font-size:12px;color:var(--yellow2);font-weight:600;margin-top:8px}
.crr-rrr{display:flex;gap:20px;margin-top:14px;flex-wrap:wrap}
.stat-pill{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:12px;display:flex;flex-direction:column;align-items:center}
.stat-pill .label{color:var(--text3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.stat-pill .val{font-size:16px;font-weight:800;color:var(--text);line-height:1.2}
.recent-balls{display:flex;gap:5px;flex-wrap:wrap;margin-top:14px;align-items:center}
.recent-balls .rlabel{font-size:11px;color:var(--text3);font-weight:600;margin-right:4px;text-transform:uppercase;letter-spacing:1px}
.ball{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;border:1.5px solid transparent}
.ball-0{background:#161b22;color:var(--text3);border-color:var(--border)}
.ball-1,.ball-2,.ball-3{background:#0d2137;color:var(--blue2);border-color:var(--blue)}
.ball-4{background:#0a2a0f;color:var(--green2);border-color:var(--green)}
.ball-6{background:#1a0d2e;color:var(--accent2);border-color:var(--accent)}
.ball-W{background:#2a0a09;color:var(--red2);border-color:var(--red)}
.ball-wd,.ball-nb{background:#2a200a;color:var(--yellow2);border-color:var(--yellow)}

/* ── Grid ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
@media(max-width:800px){.grid-2,.grid-3{grid-template-columns:1fr}}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.card-title .icon{font-size:14px}

/* ── Win Probability ── */
.win-prob-card{background:linear-gradient(135deg,#0d0a1a,#0f1117);border:1px solid var(--border2)}
.prob-bars{display:flex;flex-direction:column;gap:14px}
.prob-row{display:flex;flex-direction:column;gap:5px}
.prob-row .pname{display:flex;justify-content:space-between;font-size:13px;font-weight:600}
.prob-row .pname .pct{font-size:18px;font-weight:900}
.prob-bar-track{height:10px;background:var(--card2);border-radius:5px;overflow:hidden}
.prob-bar-fill{height:100%;border-radius:5px;transition:width 0.8s cubic-bezier(.4,0,.2,1)}
.fill-bat{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.fill-bowl{background:linear-gradient(90deg,var(--blue),var(--blue2))}
.prob-vs{text-align:center;font-size:11px;color:var(--text3);font-weight:600;letter-spacing:2px;margin:4px 0}

/* ── Next Ball ── */
.next-ball-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:500px){.next-ball-grid{grid-template-columns:repeat(4,1fr)}}
.nb-item{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;transition:transform .1s}
.nb-item:hover{transform:translateY(-2px)}
.nb-label{font-size:14px;font-weight:800;margin-bottom:4px}
.nb-pct{font-size:16px;font-weight:900;line-height:1}
.nb-bar{height:4px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.nb-bar-fill{height:100%;border-radius:2px;transition:width .8s ease}
.nb-dot{color:var(--text3)} .nb-1{color:var(--blue2)} .nb-2{color:var(--blue2)}
.nb-3{color:var(--blue2)} .nb-4{color:var(--green2)} .nb-6{color:var(--accent2)}
.nb-W{color:var(--red2)} .nb-wd{color:var(--yellow2)}

/* ── Tables ── */
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);text-align:left;padding:6px 8px;border-bottom:1px solid var(--border)}
.data-table td{padding:8px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:rgba(255,255,255,.02)}
.player-name{font-weight:600;color:var(--text)}
.proj-badge{background:rgba(124,58,237,.15);color:var(--accent2);border:1px solid rgba(124,58,237,.3);border-radius:5px;padding:2px 7px;font-size:11px;font-weight:700}
.proj-badge.green{background:rgba(35,134,54,.15);color:var(--green2);border-color:rgba(35,134,54,.3)}
.tag-bat{font-size:10px;background:#1a0d2e;color:var(--accent2);border-radius:4px;padding:1px 5px;font-weight:600}
.tag-bowl{font-size:10px;background:#0d2137;color:var(--blue2);border-radius:4px;padding:1px 5px;font-weight:600}

/* ── MoM ── */
.mom-list{display:flex;flex-direction:column;gap:8px}
.mom-item{display:flex;align-items:center;gap:10px;background:var(--card2);border-radius:10px;padding:10px 12px;border:1px solid var(--border)}
.mom-rank{font-size:16px;width:24px;text-align:center}
.mom-info{flex:1}
.mom-info .mname{font-weight:700;font-size:13px}
.mom-info .mteam{font-size:11px;color:var(--text3)}
.mom-stats{font-size:11px;color:var(--text2);display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
.mom-impact{font-size:20px;font-weight:900;color:var(--yellow2)}
.mom-bar{height:4px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.mom-bar-fill{height:100%;background:linear-gradient(90deg,var(--yellow),var(--yellow2));border-radius:2px;transition:width .8s ease}
.mom-item:first-child{background:linear-gradient(90deg,rgba(179,136,0,.08),var(--card2));border-color:rgba(227,179,65,.25)}

/* ── Score Projection ── */
.proj-range{display:flex;gap:10px;margin-top:4px}
.proj-box{flex:1;text-align:center;border-radius:10px;padding:12px 8px;border:1px solid var(--border)}
.proj-box.low{background:#1a1000;border-color:var(--orange)}
.proj-box.mid{background:#0a1a0d;border-color:var(--green)}
.proj-box.high{background:#100a1a;border-color:var(--accent)}
.proj-box .pval{font-size:28px;font-weight:900;line-height:1}
.proj-box .ptag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-top:4px}
.proj-box.low .pval{color:var(--orange2)}
.proj-box.mid .pval{color:var(--green2)}
.proj-box.high .pval{color:var(--accent2)}

/* ── Fall of Wickets ── */
.fow-list{display:flex;flex-wrap:wrap;gap:6px}
.fow-item{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:11px}
.fow-item .fwick{font-weight:800;color:var(--red2)}
.fow-item .fscore{font-weight:600;color:var(--text)}
.fow-item .fbat{color:var(--text3)}

/* ── Loading / Empty ── */
.loading{text-align:center;padding:60px 20px;color:var(--text3)}
.loading .spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent2);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{color:var(--text3);font-size:13px;text-align:center;padding:20px}

/* ── Demo Banner ── */
.demo-banner{background:rgba(179,136,0,.1);border:1px solid rgba(227,179,65,.3);border-radius:10px;padding:10px 16px;margin-bottom:16px;font-size:12px;color:var(--yellow2);display:flex;align-items:center;gap:8px}
.demo-banner a{color:var(--accent2);text-decoration:none;font-weight:600}

/* ── Footer ── */
.footer{text-align:center;color:var(--text3);font-size:12px;margin-top:40px;padding-top:20px;border-top:1px solid var(--border)}
</style>
</head>
<body>
<div class="page">

  <!-- Top Bar -->
  <div class="topbar">
    <div class="logo">
      <span style="font-size:26px">🏏</span>
      <h1>IPL <span>Live</span> Predictor</h1>
    </div>
    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
      <div class="live-badge"><span class="dot"></span>LIVE</div>
      <div class="refresh-info">Auto-refresh in <span id="countdown">30</span>s</div>
    </div>
  </div>

  <!-- Match Selector -->
  <div class="match-selector-wrap">
    <label>Match</label>
    <select id="matchSelect" onchange="loadMatch(this.value)">
      <option value="">Loading matches…</option>
    </select>
  </div>

  <!-- Demo Banner (shown when demo) -->
  <div class="demo-banner" id="demoBanner" style="display:none">
    ⚠️ Showing <strong>demo data</strong> — no live IPL match found right now. Real matches will auto-load when IPL is live.
  </div>

  <!-- Main content -->
  <div id="mainContent">
    <div class="loading"><div class="spinner"></div>Loading match data…</div>
  </div>

</div><!-- /page -->

<script>
const API = '';  // same origin
let currentMatchId = null;
let refreshTimer = null;
let countdown = 30;

// ── Fetch matches on load ─────────────────────────────────────────────────────
async function loadMatches() {
  try {
    const res = await fetch(`${API}/api/matches`);
    const matches = await res.json();
    const sel = document.getElementById('matchSelect');
    sel.innerHTML = '';
    matches.forEach((m, i) => {
      const opt = document.createElement('option');
      opt.value = m.id;
      opt.textContent = m.name;
      if (i === 0) opt.selected = true;
      sel.appendChild(opt);
    });
    if (matches.length > 0) loadMatch(matches[0].id);
  } catch(e) {
    console.error(e);
  }
}

// ── Load match + predictions ─────────────────────────────────────────────────
async function loadMatch(id) {
  if (!id) return;
  currentMatchId = id;
  document.getElementById('mainContent').innerHTML = '<div class="loading"><div class="spinner"></div>Fetching predictions…</div>';
  resetCountdown();

  try {
    const res = await fetch(`${API}/api/match/${id}`);
    const data = await res.json();
    if (data.error) { document.getElementById('mainContent').innerHTML = `<div class="empty">${data.error}</div>`; return; }
    renderDashboard(data);
    document.getElementById('demoBanner').style.display = id === 'demo' ? 'flex' : 'none';
  } catch(e) {
    document.getElementById('mainContent').innerHTML = `<div class="empty">Failed to load: ${e.message}</div>`;
  }
}

// ── Render full dashboard ─────────────────────────────────────────────────────
function renderDashboard(data) {
  const match = data.match;
  const preds = data.predictions;
  const state = preds.match_state;
  const balls_completed = 120 - state.balls_left;

  let html = '';

  // ── Match Header ──
  const target = match.target;
  const score  = match.score;
  const overs  = `${match.overs_completed}.${match.balls_in_over}`;

  html += `<div class="match-header">
    <div class="match-name">${match.name}</div>
    <div class="scoreline">
      <div class="team-score">
        <div class="tname">${match.batting_team}</div>
        <div class="tscore">${score}<small>/${match.wickets}</small></div>
        <div class="tovers">${overs} overs</div>
      </div>
      <div class="vs-divider">vs</div>
      <div class="team-score" style="text-align:right">
        <div class="tname">${match.bowling_team}</div>
        ${target ? `<div class="tscore">${target - 1}<small>/10</small></div><div class="tovers">Target: ${target}</div>` : '<div class="tscore" style="font-size:22px;color:var(--text3)">—</div><div class="tovers">1st Innings</div>'}
      </div>
    </div>
    <div class="match-status">${match.status}</div>
    <div class="crr-rrr">
      <div class="stat-pill"><span class="label">CRR</span><span class="val">${state.crr}</span></div>
      ${target ? `<div class="stat-pill"><span class="label">RRR</span><span class="val">${state.rrr}</span></div>
      <div class="stat-pill"><span class="label">Need</span><span class="val">${state.runs_needed} off ${state.balls_left}</span></div>` : ''}
      <div class="stat-pill"><span class="label">Overs Left</span><span class="val">${state.overs_left}</span></div>
    </div>
    ${match.recent_balls && match.recent_balls.length ? `
    <div class="recent-balls">
      <span class="rlabel">Recent</span>
      ${match.recent_balls.slice(-12).map(b => `<div class="ball ball-${b}">${b}</div>`).join('')}
    </div>` : ''}
  </div>`;

  // ── Row 1: Win Prob + Next Ball ──
  html += '<div class="grid-2" style="margin-bottom:14px">';

  // Win probability
  if (preds.win_probability) {
    const wp = preds.win_probability;
    html += `<div class="card win-prob-card">
      <div class="card-title"><span class="icon">📊</span>Win Probability</div>
      <div class="prob-bars">
        <div class="prob-row">
          <div class="pname"><span>${wp.batting_team}</span><span class="pct" style="color:var(--accent2)">${wp.batting_prob}%</span></div>
          <div class="prob-bar-track"><div class="prob-bar-fill fill-bat" style="width:${wp.batting_prob}%"></div></div>
        </div>
        <div class="prob-vs">VS</div>
        <div class="prob-row">
          <div class="pname"><span>${wp.bowling_team}</span><span class="pct" style="color:var(--blue2)">${wp.bowling_prob}%</span></div>
          <div class="prob-bar-track"><div class="prob-bar-fill fill-bowl" style="width:${wp.bowling_prob}%"></div></div>
        </div>
      </div>
    </div>`;
  } else if (preds.score_projection) {
    const sp = preds.score_projection;
    html += `<div class="card">
      <div class="card-title"><span class="icon">🎯</span>Projected Final Score</div>
      <div class="proj-range">
        <div class="proj-box low"><div class="pval">${sp.low}</div><div class="ptag">Low</div></div>
        <div class="proj-box mid"><div class="pval">${sp.mid}</div><div class="ptag">Expected</div></div>
        <div class="proj-box high"><div class="pval">${sp.high}</div><div class="ptag">High</div></div>
      </div>
    </div>`;
  }

  // Next Ball
  const nb = preds.next_ball;
  const maxNb = Math.max(...Object.values(nb));
  const nbMap = {'dot':'⬤ Dot','1':'1 Run','2':'2 Runs','3':'3 Runs','4':'Four','6':'Six','W':'Wicket','wd':'Wide'};
  const nbColor = {'dot':'var(--text3)','1':'var(--blue2)','2':'var(--blue2)','3':'var(--blue2)','4':'var(--green2)','6':'var(--accent2)','W':'var(--red2)','wd':'var(--yellow2)'};
  html += `<div class="card">
    <div class="card-title"><span class="icon">🎲</span>Next Ball Prediction</div>
    <div class="next-ball-grid">
    ${Object.entries(nb).map(([k,v]) => `
      <div class="nb-item">
        <div class="nb-label nb-${k}" style="color:${nbColor[k]||'var(--text)'}">${nbMap[k]||k}</div>
        <div class="nb-pct" style="color:${nbColor[k]||'var(--text)'}">${v}%</div>
        <div class="nb-bar"><div class="nb-bar-fill" style="width:${v/maxNb*100}%;background:${nbColor[k]||'var(--accent2)'}"></div></div>
      </div>`).join('')}
    </div>
  </div>`;

  html += '</div>'; // end grid-2

  // ── Row 2: Batting + Bowling Projections ──
  html += '<div class="grid-2" style="margin-bottom:14px">';

  // Batting projections
  const batProj = preds.batting_projections || [];
  html += `<div class="card">
    <div class="card-title"><span class="icon">🏏</span>Batting Projections</div>
    <table class="data-table">
      <thead><tr>
        <th>Batsman</th><th>Now</th><th>SR</th><th>Projected</th>
      </tr></thead>
      <tbody>
      ${batProj.length ? batProj.map(b => `
        <tr>
          <td><div class="player-name">${b.name}</div><span class="${b.status==='Out'?'tag-bowl':'tag-bat'}">${b.status}</span></td>
          <td>${b.current}</td>
          <td style="color:var(--text2)">${b.sr}</td>
          <td><span class="proj-badge ${b.status==='Out'?'':'green'}">${b.projected}</span></td>
        </tr>`).join('') : '<tr><td colspan="4" class="empty">No batting data</td></tr>'}
      </tbody>
    </table>
  </div>`;

  // Bowling projections
  const bowlProj = preds.bowling_projections || [];
  html += `<div class="card">
    <div class="card-title"><span class="icon">🎳</span>Bowling Projections</div>
    <table class="data-table">
      <thead><tr>
        <th>Bowler</th><th>Wkts</th><th>Eco</th><th>Proj W</th>
      </tr></thead>
      <tbody>
      ${bowlProj.length ? bowlProj.map(b => `
        <tr>
          <td><div class="player-name">${b.name}</div><span style="font-size:10px;color:var(--text3)">${b.overs_done} ov done</span></td>
          <td style="font-weight:700;color:var(--red2)">${b.current_wickets}</td>
          <td style="color:var(--text2)">${b.economy}</td>
          <td><span class="proj-badge">${b.projected_wickets}</span></td>
        </tr>`).join('') : '<tr><td colspan="4" class="empty">No bowling data</td></tr>'}
      </tbody>
    </table>
  </div>`;

  html += '</div>'; // end grid-2

  // ── Row 3: MoM + Fall of Wickets ──
  html += '<div class="grid-2" style="margin-bottom:14px">';

  // Man of the Match
  const momList = preds.mom || [];
  const maxImpact = momList.length ? momList[0].impact : 1;
  const medals = ['🥇','🥈','🥉','4️⃣','5️⃣'];
  html += `<div class="card">
    <div class="card-title"><span class="icon">⭐</span>Man of the Match Prediction</div>
    <div class="mom-list">
    ${momList.map((p,i) => `
      <div class="mom-item">
        <div class="mom-rank">${medals[i]||i+1}</div>
        <div class="mom-info">
          <div class="mname">${p.name}</div>
          <div class="mteam">${p.team}</div>
          <div class="mom-stats">
            ${p.runs > 0 ? `<span>🏏 ${p.runs} runs</span>` : ''}
            ${p.wickets > 0 ? `<span>🎳 ${p.wickets} wkts</span>` : ''}
            ${p.catches > 0 ? `<span>🤲 ${p.catches} catch</span>` : ''}
          </div>
          <div class="mom-bar"><div class="mom-bar-fill" style="width:${(p.impact/maxImpact*100).toFixed(0)}%"></div></div>
        </div>
        <div class="mom-impact">${p.impact}</div>
      </div>`).join('')}
    ${!momList.length ? '<div class="empty">No player data</div>' : ''}
    </div>
  </div>`;

  // Fall of wickets
  const fow = match.fall_of_wickets || [];
  html += `<div class="card">
    <div class="card-title"><span class="icon">📉</span>Fall of Wickets</div>
    ${fow.length ? `<div class="fow-list">
      ${fow.map(f => `<div class="fow-item"><span class="fwick">${f.wicket}W</span> <span class="fscore">${f.score}</span> <span class="fbat">(${f.batsman} • ${f.over})</span></div>`).join('')}
    </div>` : '<div class="empty">No wickets yet</div>'}
  </div>`;

  html += '</div>'; // end grid-2

  // ── Commentary ──
  const commentary = match.commentary || [];
  if (commentary.length) {
    html += `<div class="card" style="margin-bottom:14px">
      <div class="card-title"><span class="icon">🎙️</span>Live Commentary</div>
      <div style="display:flex;flex-direction:column;gap:8px">
      ${commentary.map(c => `
        <div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:11px;font-weight:700;color:var(--accent2);white-space:nowrap;min-width:32px">${c.ball}</span>
          <span style="font-size:13px;color:var(--text2)">${c.text}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }

  html += '<div class="footer">IPL Live Predictor 2026 • Live data from Cricbuzz • Predictions are probability-based estimates • Built by Vivek & Hardik</div>';

  document.getElementById('mainContent').innerHTML = html;
}

// ── Countdown & Auto-refresh ─────────────────────────────────────────────────
function resetCountdown() {
  clearInterval(refreshTimer);
  countdown = 30;
  document.getElementById('countdown').textContent = countdown;
  refreshTimer = setInterval(() => {
    countdown--;
    document.getElementById('countdown').textContent = countdown;
    if (countdown <= 0) {
      if (currentMatchId) loadMatch(currentMatchId);
    }
  }, 1000);
}

// ── Init ─────────────────────────────────────────────────────────────────────
loadMatches();
</script>
</body>
</html>
